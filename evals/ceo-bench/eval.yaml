id: ceo-bench
name: CEO-Bench（NovaMind 创业模拟）
category: useful
display_category: agent
description: 基于 Princeton CEO-Bench 的长周期 agent 经营评测：模型作为 bash agent 经营 NovaMind SaaS 创业公司，通过 novamind-operation CLI 做定价、研发、投放与容量决策，每周推进并阅读仪表盘，现金耗尽即破产终止；考察长程规划与经营结果。
hook_title: 一百万美元开局，谁能不破产
dimensions: [经营, 推理]
interface: agent
runner: custom
scoring: custom
scored_by: author
score_unit: 元
tiebreak:
  metric: tiebreak_value
  order: desc
  label: 存活天数
scoring_note: 计分口径（2026-07-18 拍板）：CEO-bench 分数 = 经营结束时的最终资金（元）；破产（现金耗尽终止）计 0 分，破产成绩之间按存活天数排名（tiebreak，存活久者名次靠前），存活天数写入 raw_metric.tiebreak_value；多次试跑取平均存活天数。判分证据以归档运行的 world.nmdb ledger 现金轨迹与 checkpoint.json/logs 为准，由作者（@502399493zjw-lgtm）复核。作者判分选项保持开启：自带分数的提交走默认模式（scored，待作者认可），score=null 的提交请作者判分。task_results[].score 记录的是观测到的存活天数（原始观测，不是最终评分）。
command_template:
  argv: [node, evals/ceo-bench/pack-to-result.mjs, ceobench-run-dir, --out, "{output}"]
  output: ceo-bench-result.json
trials: 1
est_tokens: 50000000
tasks:
  - id: novamind-default-seed42
    prompt: 以 bash agent 身份经营 NovaMind SaaS 创业模拟：初始现金 $1,000,000，随机种子 42，default 场景。通过 novamind-operation CLI 管理三档订阅定价（A/B/C）、模型档位、用量配额、算力容量、每日运维/研发支出与广告投放；用 next-week 按周推进并阅读每周仪表盘（现金、个人订阅用户、企业席位、未决 issue 等）。现金耗尽即破产、运行终止。目标是在长周期内保持公司存活并最大化经营成果。归档运行的本地配置为 3,647 天（与官方发布的 500 天协议不同，结果不可并入论文协议组）。
