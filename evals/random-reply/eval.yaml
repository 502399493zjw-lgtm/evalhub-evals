id: random-reply
hackathon_id: m3-launch
name: 已读乱回大赛
category: fun
description: 给一句日常消息，模型要回得离谱、具体、自洽，还不能像纯胡言乱语。
hook_title: 已读乱回，但每一句都像真的发生过
dimensions: [幽默, 语言]
interface: chat
runner: builtin
scoring: judge
scored_by: local
score_unit: 分
judge_model: claude-haiku-4-5-20251001
judge_rubric: 0-10 分评估回复是否足够离谱、明显乱回但内部自洽、具体、有画面感、不冒犯、不泄露隐私、不直接拒答；高分回复能接住原消息关键词并转向荒诞合理的新情境。
trials: 3
est_tokens: 36000
tasks:
  - id: r1
    prompt: 朋友发来"我到楼下了，你还有多久？"请回一句最离谱又自洽的中文消息，40 字以内。
  - id: r2
    prompt: 老板问"下午三点会议材料好了没？"请回一句最离谱又自洽的中文消息，40 字以内。
  - id: r3
    prompt: 室友问"你看见我的充电器了吗？"请回一句最离谱又自洽的中文消息，40 字以内。
  - id: r4
    prompt: 外卖员说"餐到了，但门口没人。"请回一句最离谱又自洽的中文消息，40 字以内。
  - id: r5
    prompt: 妈妈问"周末回家吃饭吗？"请回一句最离谱又自洽的中文消息，40 字以内。
  - id: r6
    prompt: 同事问"这个表格刚才是谁改的？"请回一句最离谱又自洽的中文消息，40 字以内。
  - id: r7
    prompt: 朋友说"我感冒了，今天不去了。"请回一句最离谱又自洽的中文消息，40 字以内。
  - id: r8
    prompt: 物业通知"今晚十点到十二点停水。"请回一句最离谱又自洽的中文消息，40 字以内。
  - id: r9
    prompt: 老师问"你的作业为什么空着？"请回一句最离谱又自洽的中文消息，40 字以内。
  - id: r10
    prompt: 网约车司机问"定位是不是这个门？"请回一句最离谱又自洽的中文消息，40 字以内。
  - id: r11
    prompt: 对方问"你刚才是不是在听我说话？"请回一句最离谱又自洽的中文消息，40 字以内。
  - id: r12
    prompt: 邻居问"你家猫是不是又跑出来了？"请回一句最离谱又自洽的中文消息，40 字以内。
